repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: detect-private-key
        name: detect private key
        entry: bash -c 'grep -rn "gsk_[a-zA-Z0-9]\{20,\}\|AIzaSy[a-zA-Z0-9_-]\{33\}\|AKIA[A-Z0-9]\{16\}" "$@" 2>/dev/null && exit 1 || exit 0'
        language: system
        pass_filenames: true
        exclude: "(pre-commit-config\\.yaml|\\.env\\.example)"

      - id: no-direct-push-check
        name: check for debug artifacts
        entry: bash -c 'grep -rn "print(.*password\|import pdb\|breakpoint()" "$@" 2>/dev/null && exit 1 || exit 0'
        language: system
        types: [python]
        pass_filenames: true
