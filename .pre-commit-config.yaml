repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: detect-private-key
        name: detect private key
        entry: bash -c 'git diff --staged | grep -E "^\+(.*gsk_[a-zA-Z0-9]{20,}|.*AIzaSy[a-zA-Z0-9_-]{33}|.*AKIA[A-Z0-9]{16})" && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: no-direct-push-check
        name: check for debug artifacts
        entry: bash -c 'grep -rn "import pdb\|breakpoint()" backend/app/ 2>/dev/null && exit 1 || exit 0'
        language: system
        pass_filenames: false
