app = "eazzidoc-api"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile.worker"
  # Both web and worker processes share this image.
  # The web process never imports torch at runtime — ML models only load inside
  # the Celery worker task — so the extra disk space has no runtime memory cost.

[env]
  ENVIRONMENT = "production"
  PORT = "8000"

# ── Process groups ─────────────────────────────────────────────────────────────
[processes]
  app    = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"
  worker = "python -m app.workers.polling"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

# ── Web: slim, no ML ──────────────────────────────────────────────────────────
[[vm]]
  processes = ["app"]
  size = "shared-cpu-1x"
  memory = "512mb"

# ── Worker: PyTorch + TorchXRayVision + RETFound ──────────────────────────────
# Memory breakdown (approximate):
#   PyTorch runtime:           ~300 MB
#   TorchXRayVision DenseNet:  ~150 MB
#   RETFound ViT-Large (ODIR): ~800 MB  ← main driver; killed at 793 MB on 1 GB
#   LiteMedSAM (when enabled): ~150 MB
#   OS + Python overhead:      ~200 MB
#   ─────────────────────────────────────
#   Peak estimate:             ~1.6 GB  →  2 GB gives safe headroom
[[vm]]
  processes = ["worker"]
  size = "shared-cpu-2x"
  memory = "2gb"

[deploy]
  release_command = "alembic upgrade head"
