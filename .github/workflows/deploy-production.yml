name: Deploy — Production

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy backend (Fly.io)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: backend
        run: flyctl deploy --remote-only --app eazzidoc-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Force-cycle the worker machine so it picks up the new image and command.
      # 'flyctl deploy' replaces app machines, but the worker process group (no
      # HTTP health check) can keep the old machine running if the new one fails
      # to start. Scale to 0 then 1 guarantees a fresh machine with new code.
      - name: Restart worker machine
        run: |
          flyctl scale count worker=0 --app eazzidoc-api --yes
          sleep 5
          flyctl scale count worker=1 --app eazzidoc-api --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment health
        run: |
          echo "Waiting for app to become healthy..."
          sleep 15
          flyctl status --app eazzidoc-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
