name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: eazzidoc_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost/eazzidoc_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-test-secret-key-not-used-in-prod
      ENVIRONMENT: development
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        # ML extras (tensorflow, keras) excluded from CI — too large and not needed for API tests
        run: pip install --upgrade pip && pip install -e ".[dev]"

      - name: Security scan (bandit)
        working-directory: backend
        run: bandit -r app/ -ll -x app/tests

      - name: Run tests
        working-directory: backend
        run: pytest app/tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
        continue-on-error: true
